name: DriveStats
options:
  bundleIdPrefix: com.drivestats
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true

packages:
  DriveStatsCore:
    path: Packages/DriveStatsCore

targets:
  DriveStats:
    type: application
    platform: iOS
    sources:
      - App
    dependencies:
      - package: DriveStatsCore
    info:
      path: App/Info.plist
      properties:
        CFBundleDisplayName: DriveStats
        UILaunchScreen: {}
        ITSAppUsesNonExemptEncryption: false
        NSLocationWhenInUseUsageDescription: DriveStats records your speed, distance, and route while you drive. Location is only used during an active recording.
        UIBackgroundModes:
          - location
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.drivestats.app
        MARKETING_VERSION: "0.1.0"
        CURRENT_PROJECT_VERSION: "1"
        TARGETED_DEVICE_FAMILY: "1"
        SWIFT_VERSION: "5.9"
    scheme:
      testTargets: []
